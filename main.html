<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>market-raider — BearChecker · Market cycle assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c0f14;
      --bg-panel: #13171e;
      --bg-hover: #1a1f28;
      --border: #252b36;
      --accent: #f59e0b;
      --accent-dim: #d97706;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --glow: rgba(245, 158, 11, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1.5rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .logo {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 1.6rem;
      color: var(--accent);
    }
    .tagline { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.25rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .addr { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--green); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    input.contract { width: 240px; padding: 0.5rem 0.65rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
    .btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { filter: brightness(1.1); box-shadow: 0 0 14px var(--glow); }
    .btn.small { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      padding: 1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stats span { color: var(--text-dim); }
    .stats strong { color: var(--accent); margin-right: 0.25rem; font-family: 'IBM Plex Mono', monospace; }
    .tabs { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1rem; }
    .tab { padding: 0.5rem 1rem; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; border-radius: 6px; font-size: 0.9rem; }
    .tab:hover { color: var(--text); }
    .tab.active { border-color: var(--accent); color: var(--accent); }
    .panel { display: none; }
    .panel.visible { display: block; }
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.1rem;
      margin-bottom: 1rem;
    }
    .card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--accent); }
    .card h4 { font-size: 0.9rem; margin: 0.75rem 0 0.5rem; color: var(--text-dim); }
    label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.25rem; }
    .input, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .row .card { flex: 1; min-width: 260px; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .msg { padding: 0.5rem; border-radius: 6px; margin-top: 0.5rem; font-size: 0.85rem; }
    .msg.ok { background: rgba(34,197,94,0.12); border: 1px solid var(--green); color: var(--green); }
    .msg.err { background: rgba(239,68,68,0.12); border: 1px solid var(--red); color: var(--red); }
    .msg.info { background: var(--glow); border: 1px solid var(--accent); color: var(--accent); }
    .list { list-style: none; }
    .list li {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .list li:hover { background: var(--bg-hover); }
    .list .meta { margin-top: 0.4rem; color: var(--text-dim); font-size: 0.8rem; }
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; font-size: 0.85rem; }
    .config-item { padding: 0.5rem; background: var(--bg); border-radius: 4px; }
    .config-item .k { color: var(--text-dim); }
    .config-item .v { font-family: 'IBM Plex Mono', monospace; word-break: break-all; font-size: 0.8rem; }
    .phase-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-right: 0.35rem; }
    .phase-0 { background: #333; color: var(--text-dim); }
    .phase-1 { background: rgba(34,197,94,0.2); color: var(--green); }
    .phase-2 { background: rgba(245,158,11,0.2); color: var(--accent); }
    .phase-3 { background: rgba(239,68,68,0.2); color: var(--red); }
    .phase-4 { background: rgba(139,92,246,0.2); color: #a78bfa; }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-dim); text-align: center; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-dim); font-weight: 500; }
    .copy-btn { padding: 0.2rem 0.4rem; font-size: 0.75rem; cursor: pointer; margin-left: 0.25rem; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .dashboard-tile { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .dashboard-tile .label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.25rem; }
    .dashboard-tile .value { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; color: var(--accent); }
    .help-toggle { font-size: 0.85rem; color: var(--text-dim); cursor: pointer; margin-top: 0.5rem; }
    .help-toggle:hover { color: var(--accent); }
    .help-body { margin-top: 0.5rem; padding: 0.75rem; background: var(--bg); border-radius: 6px; font-size: 0.85rem; line-height: 1.5; color: var(--text-dim); }
    .batch-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 0.5rem; }
    .batch-row .input { flex: 1; min-width: 60px; margin-bottom: 0; }
    @media (max-width: 640px) { .wrap { padding: 1rem; } .header-right { width: 100%; } input.contract { width: 100%; } }
    .constants-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.5rem; font-size: 0.85rem; }
    .constants-list .k { color: var(--text-dim); }
    .constants-list .v { font-family: 'IBM Plex Mono', monospace; }
    .network-bar { font-size: 0.8rem; color: var(--text-dim); padding: 0.35rem 0; }
    input:focus, select:focus, .btn:focus { outline: 1px solid var(--accent); outline-offset: 1px; }
    .err { color: var(--red); }
    .last-updated { font-size: 0.75rem; color: var(--text-dim); margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="logo">market-raider</div>
        <p class="tagline">BearChecker · Market cycle assessment · Submit &amp; query</p>
      </div>
      <div class="header-right">
        <input type="text" id="contract-address" class="contract" placeholder="BearChecker 0x..." />
        <button type="button" class="btn small" id="btn-copy-contract" title="Copy contract address">Copy</button>
        <span class="addr" id="wallet-addr">—</span>
        <span class="network-bar" id="network-bar"></span>
        <button type="button" class="btn" id="btn-refresh" title="Refresh">↻</button>
        <button type="button" class="btn primary" id="btn-connect">Connect</button>
      </div>
    </header>

    <div class="stats" id="stats">
      <span><strong id="stat-total">0</strong> assessments</span>
      <span><strong id="stat-treasury">0</strong> treasury</span>
      <span><strong id="stat-fee">0</strong> fee (wei)</span>
      <span><strong id="stat-snapshots">0</strong> snapshots</span>
      <span class="last-updated" id="last-updated"></span>
    </div>

    <nav class="tabs">
      <button type="button" class="tab" data-tab="dashboard">Dashboard</button>
      <button type="button" class="tab active" data-tab="submit">Submit</button>
      <button type="button" class="tab" data-tab="latest">Latest</button>
      <button type="button" class="tab" data-tab="phase-summary">Phase summary</button>
      <button type="button" class="tab" data-tab="snapshots">Snapshots</button>
      <button type="button" class="tab" data-tab="lookup">Lookup</button>
      <button type="button" class="tab" data-tab="config">Config</button>
    </nav>

    <section id="panel-dashboard" class="panel">
      <div class="card">
        <h3>Cycle overview</h3>
        <p class="text-dim" style="margin-bottom:0.75rem;">Aggregate score stats and latest oracle snapshot.</p>
        <div class="dashboard-grid" id="dashboard-tiles"></div>
        <div id="dashboard-latest-snapshot" style="font-size:0.85rem;"></div>
      </div>
    </section>

    <section id="panel-submit" class="panel visible">
      <div class="row">
        <div class="card">
          <h3>Submit assessment</h3>
          <label>Phase (0=other, 1=accumulation, 2=markup, 3=distribution, 4=markdown)</label>
          <select id="submit-phase">
            <option value="0">0 — Other</option>
            <option value="1">1 — Accumulation</option>
            <option value="2">2 — Markup</option>
            <option value="3">3 — Distribution</option>
            <option value="4">4 — Markdown</option>
          </select>
          <label>Bear score (0–10000)</label>
          <input type="number" id="submit-score" class="input" min="0" max="10000" value="5000" />
          <label>Risk level (0–10)</label>
          <input type="number" id="submit-risk" class="input" min="0" max="10" value="5" />
          <label>Metadata hash (optional, 0x... or leave blank)</label>
          <input type="text" id="submit-meta" class="input" placeholder="0x..." />
